server {
    listen 80;
    server_name files.example.com;

    root /var/www/html;

    # Protect the templates directory — never serve directly
    location /templates/ {
        internal;
    }

    # Example: serve a files directory with fancy index
    location /files/ {
        alias /var/www/files/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_before_body /templates/nginx-before.txt;
        add_after_body  /templates/nginx-after.txt;
    }

    # Example: serve a boot directory
    location /boot/ {
        alias /var/www/boot/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_before_body /templates/nginx-before.txt;
        add_after_body  /templates/nginx-after.txt;
    }
}
